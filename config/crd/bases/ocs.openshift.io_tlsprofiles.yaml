---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: tlsprofiles.ocs.openshift.io
spec:
  group: ocs.openshift.io
  names:
    kind: TLSProfile
    listKind: TLSProfileList
    plural: tlsprofiles
    singular: tlsprofile
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: |-
          TLSProfile is the Schema for the tlsprofiles API.
          It allows administrators to configure TLS settings (protocol versions, ciphers, groups)
          in a centralized way.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              Spec defines the desired TLS configuration rules.
              WARNING: On FIPS-enabled clusters, restrict ciphers to AES-GCM variants and groups to
              classical NIST curves (secp256r1, secp384r1, secp521r1). ChaCha20-Poly1305 ciphers and
              hybrid post-quantum groups are not FIPS 140-2 approved. [Apr 2026]
            properties:
              rules:
                description: |-
                  Rules is a list of TLS configuration rules.
                  When multiple rules match a component, the most specific selector wins.
                items:
                  description: TLSProfileRules pairs a selector with a TLS configuration.
                  properties:
                    config:
                      description: Config is the TLS configuration to apply to the
                        selected components.
                      properties:
                        ciphers:
                          description: Ciphers is the list of IANA cipher suite names
                            to enable, in preference order.
                          items:
                            description: |-
                              TLSCipherSuite is an IANA TLS cipher suite name.
                              TLS 1.2 ciphers are configurable in both Go and OpenSSL servers.
                              TLS 1.3 ciphers are configurable in OpenSSL only; Go selects TLS 1.3 ciphers automatically.
                              Note: ChaCha20-Poly1305 ciphers are not FIPS 140-2 approved - do not use them on FIPS-enabled clusters.
                            enum:
                            - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
                            - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
                            - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
                            - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
                            - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
                            - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
                            - TLS_AES_128_GCM_SHA256
                            - TLS_AES_256_GCM_SHA384
                            - TLS_CHACHA20_POLY1305_SHA256
                            type: string
                          maxItems: 20
                          minItems: 1
                          type: array
                          x-kubernetes-list-type: set
                        groups:
                          description: Groups is the list of key exchange groups to
                            enable, in preference order.
                          items:
                            description: |-
                              TLSGroupName is a TLS key exchange group name.
                              Classical groups (secp256r1, secp384r1, secp521r1, X25519) are valid for TLS 1.2 and TLS 1.3.
                              Hybrid post-quantum groups (X25519MLKEM768, SecP256r1MLKEM768, SecP384r1MLKEM1024) are valid for TLS 1.3 only.
                              Note: Hybrid post-quantum groups are not FIPS 140-2 approved - do not use them on FIPS-enabled clusters.
                            enum:
                            - secp256r1
                            - secp384r1
                            - secp521r1
                            - X25519
                            - X25519MLKEM768
                            - SecP256r1MLKEM768
                            - SecP384r1MLKEM1024
                            type: string
                          maxItems: 20
                          minItems: 1
                          type: array
                          x-kubernetes-list-type: set
                        version:
                          description: Version specifies the minimum and maximum TLS
                            protocol version.
                          enum:
                          - TLSv1.2
                          - TLSv1.3
                          type: string
                      required:
                      - ciphers
                      - groups
                      - version
                      type: object
                      x-kubernetes-validations:
                      - message: TLS 1.3 ciphers are not valid for TLSv1.2
                        rule: self.version != 'TLSv1.2' || !self.ciphers.exists(c,
                          c in ['TLS_AES_128_GCM_SHA256','TLS_AES_256_GCM_SHA384','TLS_CHACHA20_POLY1305_SHA256'])
                      - message: TLS 1.2 ciphers are not valid for TLSv1.3
                        rule: self.version != 'TLSv1.3' || !self.ciphers.exists(c,
                          c in ['TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256','TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384','TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256','TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256','TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384','TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256'])
                      - message: hybrid post-quantum groups are not valid for TLSv1.2
                        rule: self.version != 'TLSv1.2' || !self.groups.exists(g,
                          g in ['X25519MLKEM768','SecP256r1MLKEM768','SecP384r1MLKEM1024'])
                    selectors:
                      description: |-
                        Selectors identifies the components this rule applies to.
                        Examples:
                          "example.io/s3"      - Matches the S3 server under example.io
                          "example.io"         - Matches all servers under example.io
                          "*.example.io/s3"    - Matches the S3 server under any subdomain of example.io
                          "*.example.io"       - Matches all servers under any subdomain of example.io
                          "*/s3"               - Matches the S3 server under any domain
                          "*"                  - Matches all servers under any domain
                      items:
                        description: |-
                          Selector is a selector pattern identifying which components a TLS rule applies to.
                          Valid forms:
                            - "<domain>/<server>"   - exact domain and server
                            - "<domain>"            - all servers under this domain
                            - "*.<suffix>/<server>" - a specific server under any domain ending with suffix
                            - "*.<suffix>"          - all servers under any domain ending with suffix
                            - "*/<server>"          - a specific server under any domain
                            - "*"                   - catch-all wildcard
                        pattern: ^(\*(\.[^/]+)?(\/[^/]+)?|[^*/][^/]*(\/[^/]+)?)$
                        type: string
                      maxItems: 20
                      type: array
                  required:
                  - config
                  - selectors
                  type: object
                maxItems: 20
                type: array
            required:
            - rules
            type: object
          status:
            type: object
        required:
        - metadata
        - spec
        type: object
    served: true
    storage: true
